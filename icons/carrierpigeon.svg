<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="cp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1a16"/>
      <stop offset="1" stop-color="#0a1411"/>
    </linearGradient>
    <linearGradient id="cp-glow" x1="0.2" y1="0.1" x2="0.9" y2="0.9">
      <stop offset="0" stop-color="#8bffc0"/>
      <stop offset="1" stop-color="#3ad082"/>
    </linearGradient>
    <linearGradient id="cp-wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9ffef"/>
      <stop offset="1" stop-color="#6ef0aa"/>
    </linearGradient>
    <radialGradient id="cp-halo" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#6ef0aa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6ef0aa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rounded squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#cp-bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#cp-halo)"/>

  <!-- Subtle grid lines (signal) -->
  <g stroke="#2a3d34" stroke-width="1.2" opacity="0.55">
    <line x1="120" y1="260" x2="904" y2="260"/>
    <line x1="120" y1="420" x2="904" y2="420"/>
    <line x1="120" y1="580" x2="904" y2="580"/>
    <line x1="120" y1="740" x2="904" y2="740"/>
  </g>

  <!-- Concentric signal arcs -->
  <g fill="none" stroke="#6ef0aa" stroke-linecap="round" opacity="0.35">
    <path d="M 190 820 Q 260 720 360 720" stroke-width="10"/>
    <path d="M 150 860 Q 260 680 440 680" stroke-width="8" opacity="0.6"/>
    <path d="M 110 900 Q 260 640 520 640" stroke-width="6" opacity="0.35"/>
  </g>

  <!-- Paper-plane / pigeon silhouette -->
  <g transform="translate(512 512) rotate(-18) translate(-320 -240)">
    <!-- shadow wing -->
    <path d="M 40 360 L 620 40 L 400 480 L 300 360 Z"
          fill="#0a1411" opacity="0.55"/>
    <!-- upper wing -->
    <path d="M 40 360 L 620 40 L 360 320 Z"
          fill="url(#cp-wing)"/>
    <!-- lower wing (paper fold) -->
    <path d="M 360 320 L 620 40 L 420 460 Z"
          fill="url(#cp-glow)" opacity="0.9"/>
    <!-- fold crease highlight -->
    <path d="M 360 320 L 620 40" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <!-- tail -->
    <path d="M 360 320 L 420 460 L 300 360 Z"
          fill="#b6f7d1" opacity="0.85"/>
  </g>

  <!-- Small transmission dot -->
  <circle cx="820" cy="220" r="14" fill="#6ef0aa"/>
  <circle cx="820" cy="220" r="28" fill="#6ef0aa" opacity="0.25"/>
</svg>
